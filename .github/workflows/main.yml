name: Sync Upstream

on:
  schedule:
    - cron: '35 17 * * *'
  workflow_dispatch: # Allows you to manually trigger the sync via the GitHub UI.

jobs:
  import-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Fork
        uses: actions/checkout@v4
        with:
          ref: master # Change to 'master' if your default branch is master

      - name: Sync Upstream
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4.1
        with:
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_sync_branch: main
          upstream_sync_repo: nrudra91/giffer # e.g., facebook/react

          # Set to true if you want to force overwrite your fork if conflicts happen
          test_mode: true
